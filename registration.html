<section class="container" style="margin-top:120px;">

<h1 class="section-title">
Event Registration
</h1>

<div class="row justify-content-center">

<div class="col-lg-7">

<form id="registrationForm">

<div class="mb-3">
<label class="form-label">Student Name</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Roll Number</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Branch</label>
<select class="form-select" required>
<option value="">Select Branch</option>
<option>CSE</option>
<option>CSM</option>
<option>ECE</option>
<option>EEE</option>
<option>MECH</option>
<option>CIVIL</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Mobile Number</label>
<input type="tel" class="form-control" required>
</div>

<div class="mb-4">
<label class="form-label">Select Event</label>
<select class="form-select" required>
<option value="">Choose Event</option>
<option>Technical Quiz</option>
<option>Hackathon</option>
<option>Poster Presentation</option>
<option>Coding Contest</option>
<option>Project Expo</option>
<option>Cultural Fest</option>
</select>
</div>

<div class="text-center">

<button type="submit"
class="btn btn-custom">

Register Now

</button>

</div>

</form>

<div id="successMsg"
class="alert alert-success mt-4 text-center d-none">

Registration Successful! 🎉

</div>

</div>

</div>

</section>

<footer>

<p>
© 2026 College Event Management System
</p>

</footer>

<script>
document.getElementById("registrationForm")
.addEventListener("submit", function(event){

event.preventDefault();

document
.getElementById("successMsg")
.classList.remove("d-none");

this.reset();

});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
